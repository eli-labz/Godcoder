name: Feature Request
description: Suggest a new feature or enhancement for Godcoder
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! The more context you give, the easier it is to evaluate and prioritize.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and discussions to make sure this has not been requested already.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve? What is the limitation or pain point?
      placeholder: I find it frustrating when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you would like to see.
      placeholder: I would like Godcoder to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of Godcoder does this relate to?
      options:
        - Agent core (loop, tools, modes)
        - Desktop UI (Tauri app)
        - Context Engine (semantic search)
        - Harness mode (self-optimizing)
        - MCP server support
        - Voice API
        - LLM provider support
        - Build and packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this feature to you?
      options:
        - Nice to have
        - Important
        - Critical for my use case
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links to related projects, or any other context that would help.
